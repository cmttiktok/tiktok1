<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Livestream Thông Minh</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main: #fe2c55; --bg: #0f0f0f; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; gap: 15px; }
        .panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .left { flex: 1; border-left: 4px solid var(--main); }
        .right { flex: 2; }
        input, button, select { padding: 12px; border-radius: 8px; border: none; margin: 5px 0; width: 100%; box-sizing: border-box; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        button { background: var(--main); color: #fff; font-weight: bold; cursor: pointer; }
        .scroll { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 10px; }
        .msg { padding: 8px; border-bottom: 1px solid #222; font-size: 14px; display: flex; justify-content: space-between; }
        .toggle-box { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
        .tab-btn { background: #333; width: auto; padding: 8px 15px; margin-right: 5px; }
        .active-tab { background: var(--main); }
    </style>
</head>
<body>
    <div class="panel left">
        <h3 style="margin-top:0">🎮 ĐIỀU KHIỂN</h3>
        <button id="vBtn" onclick="toggleV()" style="background:#444">🔇 GIỌNG ĐỌC: TẮT</button>
        <input type="text" id="host" placeholder="Nhập ID TikTok...">
        <button onclick="conn()">KẾT NỐI</button>
        
        <div class="toggle-box">
            <label><input type="checkbox" id="cWelcome" checked> Chào khách</label><br>
            <label><input type="checkbox" id="cGift" checked> Cảm ơn quà</label><br>
            <label><input type="checkbox" id="cPK" checked> Nhắc PK</label>
        </div>
        
        <div class="scroll" id="chat-box"></div>
    </div>

    <div class="panel right">
        <h3 style="margin-top:0">🛠️ CẤU HÌNH HỆ THỐNG</h3>
        <div style="display:flex">
            <button class="tab-btn active-tab" onclick="showTab('word')">Từ cấm</button>
            <button class="tab-btn" onclick="showTab('bot')">Trợ lý ảo</button>
        </div>

        <div id="word-ui" class="tab-content">
            <div style="display:flex; gap:5px">
                <input type="text" id="wIn" placeholder="Thêm từ cấm...">
                <button style="width:80px" onclick="add('word')">LƯU</button>
            </div>
        </div>

        <div id="bot-ui" class="tab-content" style="display:none">
            <input type="text" id="botK" placeholder="Từ khóa khách hỏi...">
            <input type="text" id="botR" placeholder="Bot trả lời...">
            <button onclick="add('bot')">THÊM KỊCH BẢN</button>
        </div>

        <div class="scroll" id="data-list"></div>
    </div>

    <script>
        const socket = io();
        let q = [], playing = false, voice = false;

        function toggleV() {
            voice = !voice;
            document.getElementById('vBtn').innerText = voice ? "🔊 GIỌNG ĐỌC: BẬT" : "🔇 GIỌNG ĐỌC: TẮT";
            document.getElementById('vBtn').style.background = voice ? "#00f2ea" : "#444";
            if(voice) new Audio().play();
        }

        function conn() { socket.emit('set-host', document.getElementById('host').value); }

        async function add(type) {
            let payload;
            if(type==='word') payload = document.getElementById('wIn').value;
            if(type==='bot') payload = {k: document.getElementById('botK').value, r: document.getElementById('botR').value};
            
            await fetch('/api/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({type, payload}) });
            loadData();
        }

        async function del(col, id) { await fetch(`/api/${col}/${id}`, { method: 'DELETE' }); loadData(); }

        async function loadData() {
            const res = await (await fetch('/api/data')).json();
            const list = document.getElementById('data-list');
            list.innerHTML = res.words.map(w => `<div class="msg"><span>🚫 ${w.word}</span> <span style="color:red;cursor:pointer" onclick="del('word','${w._id}')">Xóa</span></div>`).join('');
        }

        function play() {
            if (!q.length) { playing = false; return; }
            playing = true; const a = new Audio(q.shift());
            a.onended = () => setTimeout(play, 200); a.play().catch(() => play());
        }

        socket.on('event', d => {
            if (d.type === 'welcome' && !document.getElementById('cWelcome').checked) return;
            if (d.type === 'gift' && !document.getElementById('cGift').checked) return;
            if (d.type === 'pk' && !document.getElementById('cPK').checked) return;

            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span><b>${d.user}:</b> ${d.msg}</span>`;
            document.getElementById('chat-box').prepend(div);

            if (voice && d.audio) { q.push(d.audio); if (!playing) play(); }
        });

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(t+'-ui').style.display = 'block';
        }

        loadData();
    </script>
</body>
</html>
