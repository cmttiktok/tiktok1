<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bèo Control 🌸 PK Master</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* GIỮ NGUYÊN 100% CSS CỦA BẠN */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --primary: #ff85a2; --bg: #fff5f7; --border: #f8bbd0; --success: #4caf50; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; color: #5d4037; }
        .app-container { display: flex; height: 100vh; }
        .left-side { width: 330px; border-right: 2px solid var(--border); background: #fff; display: flex; flex-direction: column; }
        .clock-box { background: linear-gradient(135deg, #ff85a2, #ffb3c6); color: white; padding: 12px; text-align: center; border-radius: 0 0 20px 20px; }
        #clock-time { font-size: 30px; font-weight: 700; }
        .box-conn { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 18px; margin: 10px; }
        .conn-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--border); outline: none; }
        .btn-conn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        #stt-container { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; border-radius: 12px; background: #fff8f9; border: 1.5px dashed var(--border); min-height: 50px; margin-top: 8px; }
        .stt-success { color: var(--success) !important; border-color: var(--success) !important; background: #f1f8f1 !important; border-style: solid !important; }
        #host-avatar { width: 35px; height: 35px; border-radius: 50%; display: none; object-fit: cover; border: 2px solid #fff; }
        .sw-list { padding: 0 12px; display: flex; flex-direction: column; gap: 6px; }
        .sw-item { background: white; border: 1px solid var(--border); padding: 10px 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }
        .right-side { flex: 1; padding: 15px; display: flex; flex-direction: column; }
        .journal-content { flex: 1; background: white; border: 2px solid var(--border); border-radius: 15px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; }
        .msg { padding: 8px 12px; background: #fff5f7; border-radius: 15px; font-size: 13px; border: 1px solid #ffebee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-side">
        <div class="clock-box">
            <div id="clock-time">00:00:00</div>
            <div id="clock-date">...</div>
            <div style="font-size: 13px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.3); margin-top:5px;">Bèo Google 🌸</div>
        </div>

        <div class="box-conn">
            <div class="conn-row"><input type="text" id="user" placeholder="ID TikTok..."><button class="btn-conn" onclick="start()">KẾT NỐI</button></div>
            <div id="stt-container"><img id="host-avatar" src=""><span id="stt-text">Sẵn sàng...</span></div>
        </div>

        <div class="box-conn" style="padding: 10px;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--primary); margin-bottom: 5px;"><span>TỐC ĐỘ ĐỌC</span><span id="speed-val">1.2x</span></div>
            <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.2" oninput="changeSpeed(this.value)" style="width: 100%;">
        </div>

        <div class="sw-list">
            <div class="sw-item"><span>TẮT HỆ THỐNG</span><label class="switch"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>NHẮC PK 20S</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>👋 CHÀO PHÒNG</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>🎁 TẶNG QUÀ</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item"><span>🤖 BOT ĐÁP</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
        </div>
    </div>
    <div class="right-side">
        <div class="journal-content" id="chat"></div>
    </div>
</div>

<script>
    const socket = io();
    let queue = [], isPlaying = false, currentSpeed = 1.2;

    // Bộ từ khóa cho BOT ĐÁP
    const botReplies = {
        "hi": "Chào bạn yêu đã ghé thăm livestream nha",
        "hello": "Hello bạn, chúc bạn xem live vui vẻ",
        "pk": "Mọi người chuẩn bị nhấn màn hình chuẩn bị PK nha",
        "id": "ID của mình là chipham1 nha mọi người"
    };

    // NHẮC PK 20S
    setInterval(() => {
        if (document.getElementById('pkToggle').checked && document.getElementById('masterToggle').checked) {
            addToQueue("Mọi người ơi, nhấn vào màn hình tương tác để chuẩn bị PK nào");
        }
    }, 20000);

    function start() {
        const u = document.getElementById('user').value.trim();
        if(!u) return;
        socket.emit('set-username', u);
        document.getElementById('stt-text').innerText = "⏳ Đang kết nối...";
    }

    socket.on('status', res => {
        if(res.ok) {
            const box = document.getElementById('stt-container');
            const avt = document.getElementById('host-avatar');
            box.classList.add('stt-success');
            document.getElementById('stt-text').innerText = "✅ Kết nối thành công";
            if(res.profile) {
                avt.src = `https://images.weserv.nl/?url=${encodeURIComponent(res.profile)}`;
                avt.style.display = "block";
            }
        }
    });

    socket.on('audio-data', d => {
        // Hiện lên nhật ký
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
        chat.prepend(div);

        // Xử lý âm thanh dựa trên công tắc
        if (!document.getElementById('masterToggle').checked) return;

        if (d.type === 'chat' && document.getElementById('botToggle').checked) {
            const lowMsg = d.comment.toLowerCase();
            // Nếu khớp từ khóa thì trả lời, không thì đọc bình thường
            const reply = botReplies[lowMsg] || `${d.user} nói là ${d.comment}`;
            addToQueue(reply);
        }
        if (d.type === 'gift' && document.getElementById('giftToggle').checked) addToQueue(`Cảm ơn ${d.user} đã tặng quà`);
        if (d.type === 'welcome' && document.getElementById('welcomeToggle').checked) addToQueue(`Chào mừng ${d.user} đã vào phòng`);
    });

    function addToQueue(text) { queue.push(text); if (!isPlaying) playNext(); }
    function playNext() {
        if (queue.length === 0) { isPlaying = false; return; }
        isPlaying = true;
        const utter = new SpeechSynthesisUtterance(queue.shift());
        utter.rate = currentSpeed;
        utter.onend = () => playNext();
        window.speechSynthesis.speak(utter);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('vi-VN');
        document.getElementById('clock-date').innerText = `Thứ Tư: ${now.getDate()}/${now.getMonth()+1}/2026 - ÂL: 23/1`;
    }
    setInterval(updateClock, 1000); updateClock();
    function changeSpeed(v) { document.getElementById('speed-val').innerText = v + "x"; currentSpeed = parseFloat(v); }
</script>
</body>
</html>
