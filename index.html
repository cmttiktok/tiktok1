<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKTOK TTS DASHBOARD</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #fe2c55;
            --secondary: #25f4ee;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #161823;
            --text-sub: #616770;
            --border: #e4e6eb;
            --radius: 20px; /* Độ bo tròn chính */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Bo tròn các góc */
        .sidebar {
            width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            color: var(--primary);
        }

        /* Các khối chức năng bo tròn */
        .status-card {
            background: #f8f9fa;
            padding: 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .status-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
        #stt { font-weight: 700; margin-top: 5px; display: block; color: var(--primary); }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 30px; /* Bo tròn hoàn toàn 2 đầu */
            background: #fff;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(254, 44, 85, 0.1); }

        .btn-connect {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--primary), #ff5e7e);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(254, 44, 85, 0.2);
            transition: 0.3s;
        }
        .btn-connect:hover { transform: scale(1.02); opacity: 0.95; }

        .controls-title { font-size: 12px; font-weight: 800; color: var(--text-sub); margin: 25px 0 10px 10px; }
        
        /* Item cài đặt bo tròn */
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .toggle-item:hover { background: #fdfdfd; border-color: #d1d1d1; }

        .admin-btn {
            margin-top: auto;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: #161823;
            color: #fff;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Vùng Chat Log */
        .main { flex: 1; display: flex; flex-direction: column; background: #fff; margin: 15px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .main-header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; gap: 15px; }

        /* Bong bóng chat bo tròn sâu */
        .msg { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.3s ease; }
        .msg-bubble {
            background: #e4e6eb;
            padding: 12px 20px;
            border-radius: 22px;
            border-bottom-left-radius: 5px;
            font-size: 15px;
            color: #050505;
        }
        .msg-user { font-size: 12px; font-weight: 700; margin-bottom: 4px; margin-left: 10px; color: var(--text-sub); }

        /* Switch UI tròn trịa */
        .switch { position: relative; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ced4da; border-radius: 30px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #45bd62; }
        input:checked + .slider:before { transform: translateX(18px); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fab fa-tiktok"></i> <span>IDOL BÈO</span></div>
        
        <div class="status-card">
            <span class="status-label">KẾT NỐI LIVE</span>
            <span id="stt">Chưa bắt đầu</span>
        </div>

        <div class="input-group">
            <input type="text" id="user" placeholder="@username_tiktok">
            <button class="btn-connect" onclick="start()">BẮT ĐẦU LIVE</button>
        </div>

        <div class="controls-title">CHẾ ĐỘ HOẠT ĐỘNG</div>
        <div class="toggle-item"><span>Chào khách</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Cảm ơn quà</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Trợ lý ảo</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Nhắc PK</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>

        <a href="/admin" class="admin-btn"><i class="fas fa-sliders-h"></i> CÀI ĐẶT HỆ THỐNG</a>
    </div>

    <div class="main">
        <div class="main-header">
            <h3 style="margin:0; font-size:16px;">Nhật ký trò chuyện</h3>
            <span id="counter" style="background:#f0f2f5; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; color:var(--text-sub)">0 tin</span>
        </div>
        <div id="chat">
            <div style="text-align:center; color:#bcc0c4; margin-top:100px;">
                <i class="fas fa-stream fa-3x" style="margin-bottom:15px"></i>
                <p>Nhập ID và nhấn Bắt đầu để xem nhật ký</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false, count = 0;

        function start() { 
            const user = document.getElementById('user').value;
            if(!user) return alert("Vui lòng nhập ID TikTok!");
            socket.emit('set-username', user); 
        }

        socket.on('status', m => {
            const stt = document.getElementById('stt');
            stt.innerText = m;
            stt.style.color = m.includes('Đã kết nối') ? '#45bd62' : '#fe2c55';
        });
        
        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            if(count === 0) chat.innerHTML = ''; 

            const div = document.createElement('div');
            div.className = 'msg';
            
            let bubbleStyle = '';
            if(d.type === 'gift') bubbleStyle = 'background: #fff0f3; border: 1px solid #ffccd5; color: #fe2c55;';
            if(d.type === 'bot') bubbleStyle = 'background: #e7f3ff; border: 1px solid #bbdcff; color: #1877f2;';

            div.innerHTML = `
                <div class="msg-user">${d.user}</div>
                <div class="msg-bubble" style="${bubbleStyle}">${d.comment}</div>
            `;
            chat.prepend(div);
            
            count++;
            document.getElementById('counter').innerText = `${count} tin nhắn`;

            if (d.audio) {
                if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
