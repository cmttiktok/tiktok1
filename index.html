<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Viết cho tháng ngày bên nhau - Server Voice</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .glass { width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-toggle { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; background: #444; color: #fff; }
        .active { background: #fe2c55; color: #fff; box-shadow: 0 0 10px #fe2c55; }
        #chat { height: 400px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; }
        .item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border-left: 3px solid #fe2c55; }
    </style>
</head>
<body>
    <div class="glass">
        <button id="btnVoice" class="btn-toggle" onclick="toggleVoice()">🔇 GIỌNG ĐỌC: TẮT</button>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="id" placeholder="ID TikTok..." style="flex:1; padding:10px; border-radius:10px; border:none; background:#222; color:#fff;">
            <button onclick="conn()" style="background:#fe2c55; color:#fff; border:none; padding:10px 15px; border-radius:10px; cursor:pointer;">Kết nối</button>
        </div>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let isVoiceEnabled = false;
        let queue = [], playing = false;

        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('btnVoice');
            btn.innerText = isVoiceEnabled ? "🔊 GIỌNG ĐỌC: BẬT" : "🔇 GIỌNG ĐỌC: TẮT";
            btn.classList.toggle('active', isVoiceEnabled);
            if(isVoiceEnabled) new Audio().play(); // Kích hoạt âm thanh trình duyệt
        }

        function conn() { socket.emit('set-host', document.getElementById('id').value); }

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift()); // Phát chuỗi âm thanh nhận từ server
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }

        socket.on('new-comment', d => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<b style="color:#00f2ea">${d.user}:</b> ${d.msg}`;
            document.getElementById('chat').prepend(div);

            if (isVoiceEnabled && d.audio) {
                queue.push(d.audio); // Thêm âm thanh vào hàng đợi
                if (!playing) play();
            }
        });
    </script>
</body>
</html>
