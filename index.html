<style>
    /* CSS Glassmorphism hồng/trắng của bạn được giữ nguyên ở đây */
    /* ... các class như .clock-box, .box-conn, .sw-item ... */
</style>

<div class="left-side">
    <div id="stt-container">
        <img id="host-avatar" src="" style="width:35px; height:35px; border-radius:50%; display:none; margin-right:8px;">
        <span id="stt-text">⌛ Đang kết nối...</span>
    </div>
</div>

<script>
    // CHỈ SỬA ĐÚNG LOGIC NÀY ĐỂ HIỆN ẢNH
    socket.onAny((eventName, d) => {
        if (d && d.profile) {
            const avatar = document.getElementById('host-avatar');
            const sttBox = document.getElementById('stt-container');
            
            // Hiện khung xanh đúng ý bạn
            sttBox.style.borderColor = "#4caf50";
            sttBox.style.background = "#f1f8f1";
            document.getElementById('stt-text').innerText = "✅ Kết nối thành công";
            document.getElementById('stt-text').style.color = "#4caf50";

            // Hiện ảnh qua proxy để không bị lỗi 404
            avatar.src = `https://images.weserv.nl/?url=${encodeURIComponent(d.profile)}`;
            avatar.style.display = "inline-block";
        }
    });
</script>
