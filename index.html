<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bèo Control 🌸 PK Master</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --primary: #ff85a2; --bg: #fff5f7; --card: #ffffff; --text: #5d4037; --border: #f8bbd0; --success: #4caf50; --error: #ff5252; --pk: #4dd0e1; }
        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }
        .left-side { width: 330px; display: flex; flex-direction: column; border-right: 2px solid var(--border); background: #fff; flex-shrink: 0; }
        .right-side { flex: 1; display: flex; flex-direction: column; padding: 15px; background: var(--bg); overflow: hidden; }

        .clock-box { background: linear-gradient(135deg, #ff85a2, #ffb3c6); color: white; padding: 12px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(255,133,162,0.2); }
        #clock-time { font-size: 30px; font-weight: 700; line-height: 1; }
        #clock-date { font-size: 11px; opacity: 0.9; margin: 3px 0; }
        .brand { font-size: 13px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 3px; }

        .control-panel { padding: 12px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
        .box-conn { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 18px; display: flex; flex-direction: column; gap: 8px; }
        .conn-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--border); outline: none; font-size: 14px; }
        .btn-conn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 13px; }

        #stt-container { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; font-weight: 700; padding: 8px; border-radius: 10px; background: #fff8f9; border: 1px dashed var(--border); min-height: 35px; }
        .stt-success { color: var(--success); border-color: var(--success); background: #f1f8f1; }
        .stt-error { color: var(--error); border-color: var(--error); background: #fff1f1; }

        #pk-timer { display:none; color: var(--pk); font-weight:700; font-size:14px; text-align:center; padding: 8px; border: 2px solid var(--pk); border-radius: 10px; background: #e0f7fa; }

        .sw-list { display: flex; flex-direction: column; gap: 6px; }
        .sw-item { background: white; border: 1px solid var(--border); padding: 10px 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }
        .sw-item.master { border-color: var(--error); color: var(--error); }
        .sw-item.pk { border-color: var(--pk); color: #00acc1; }

        .switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        .master input:checked + .slider { background: var(--error); }
        .pk input:checked + .slider { background: var(--pk); }
        input:checked + .slider:before { transform: translateX(16px); }

        .journal-header { background: white; padding: 10px 15px; border-radius: 15px 15px 0 0; border: 2px solid var(--border); border-bottom: none; font-weight: 700; color: var(--primary); font-size: 13px; }
        .journal-content { flex: 1; background: white; border: 2px solid var(--border); border-radius: 0 0 15px 15px; overflow-y: auto; padding: 10px; }
        .msg { padding: 8px 12px; background: var(--bg); border-left: 4px solid var(--primary); border-radius: 8px; margin-bottom: 6px; font-size: 13px; word-break: break-word; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .app-container { flex-direction: column; height: auto; }
            .left-side { width: 100%; border-right: none; height: auto; }
            .right-side { width: 100%; height: 500px; padding: 10px; }
            .sw-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .sw-item.master { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-side">
        <div class="clock-box">
            <div id="clock-time">00:00:00</div>
            <div id="clock-date">Đang tải...</div>
            <div class="brand">Bèo Google 🌸</div>
        </div>

        <div class="control-panel">
            <div class="box-conn">
                <div class="conn-row">
                    <input type="text" id="user" placeholder="Nhập ID TikTok...">
                    <button class="btn-conn" onclick="start()">KẾT NỐI</button>
                </div>
                <div id="stt-container">
                    <span id="stt-icon">✨</span>
                    <span id="stt-text">Hệ thống sẵn sàng</span>
                </div>
                <div id="pk-timer">⚔️ ĐANG PK: <span id="pk-countdown">05:00</span></div>
            </div>

            <div class="box-conn" style="padding: 10px;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--primary); margin-bottom: 5px;">
                    <span>TỐC ĐỘ ĐỌC</span><span id="speed-val">1.2x</span>
                </div>
                <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.2" oninput="changeSpeed(this.value)" style="width: 100%;">
            </div>

            <div class="sw-list">
                <div class="sw-item master"><span>TẮT HỆ THỐNG</span><label class="switch master"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item pk"><span>NHẮC PK 20S</span><label class="switch pk"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>👋 CHÀO PHÒNG</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🎁 TẶNG QUÀ</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🤖 BOT ĐÁP</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            </div>

            <div style="text-align: center; margin-top: auto; padding: 10px;">
                <a href="/admin" style="color: var(--primary); text-decoration: none; font-size: 11px; font-weight: 700; border: 1px dashed var(--primary); padding: 5px 12px; border-radius: 8px;">⚙️ QUẢN LÝ DỮ LIỆU</a>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="journal-header">🌸 NHẬT KÝ LIVE</div>
        <div class="journal-content" id="chat"></div>
    </div>
</div>

<script>
    const socket = io();
    let queue = [], playing = false, currentSpeed = 1.2;
    let pkInterval;

    // --- 1. ĐỒNG HỒ ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('vi-VN');
        const d = now.getDate(), m = now.getMonth() + 1, y = now.getFullYear();
        const tet2026 = new Date(2026, 1, 17);
        const diff = Math.floor((now - tet2026) / 86400000);
        let lDay = (diff % 30) + 1; 
        let lMonth = (Math.floor(diff / 30) % 12) + 1;
        if (lDay <= 0) { lDay += 30; lMonth -= 1; }
        document.getElementById('clock-date').innerText = `DL: ${d}/${m}/${y} - ÂL: ${lDay}/${lMonth}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // --- 2. XỬ LÝ SỐ ---
    function cleanText(text) {
        return text.replace(/\d{5,}/g, (match) => match.substring(0, 3) + "...");
    }

    // --- 3. GIỌNG NÓI HỆ THỐNG ---
    async function speakSystem(text) {
        if (!document.getElementById('masterToggle').checked) return;
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=vi&client=tw-ob`;
        const audio = new Audio(url);
        audio.playbackRate = currentSpeed;
        audio.play().catch(() => {});
    }

    function changeSpeed(v) {
        document.getElementById('speed-val').innerText = v + "x";
        currentSpeed = parseFloat(v);
    }

    // --- 4. KẾT NỐI & WAKE LOCK ---
    async function start() {
        const u = document.getElementById('user').value.trim();
        if(!u) return;
        document.getElementById('stt-icon').innerText = "⏳";
        document.getElementById('stt-text').innerText = "Đang kết nối...";
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});
        socket.emit('set-username', u);
    }

    socket.on('status', m => {
        const sttBox = document.getElementById('stt-container');
        const u = document.getElementById('user').value.trim();
        if(m.includes('✅')) {
            document.getElementById('stt-icon').innerText = "✅";
            document.getElementById('stt-text').innerText = `Kết nối thành công: ${u}`;
            sttBox.className = "stt-success";
            speakSystem("Đã kết nối thành công Bèo ơi");
        } else {
            document.getElementById('stt-icon').innerText = "❌";
            document.getElementById('stt-text').innerText = "Lỗi hệ thống, thử lại nha";
            sttBox.className = "stt-error";
            speakSystem("Lỗi rồi Bèo ơi, bấm lại nha");
        }
    });

    // --- 5. BỘ ĐẾM PK 5 PHÚT ---
    socket.on('pk-start', () => {
        if (!document.getElementById('pkToggle').checked) return;
        
        clearInterval(pkInterval); // Xóa bộ đếm cũ nếu có
        let timeLeft = 300; // 5 phút
        const timerBox = document.getElementById('pk-timer');
        const countdownText = document.getElementById('pk-countdown');
        
        timerBox.style.display = 'block';
        speakSystem("Trận PK bắt đầu rồi Bèo ơi, chiến thôi!");

        pkInterval = setInterval(() => {
            timeLeft--;
            
            // Cập nhật giao diện
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            countdownText.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            // Nhắc 20 giây cuối
            if (timeLeft === 20) {
                speakSystem("20 giây cuối thả bông lấy găng Bèo ơi, cố lên!");
                countdownText.style.color = 'var(--error)';
            }

            if (timeLeft <= 0) {
                clearInterval(pkInterval);
                timerBox.style.display = 'none';
                countdownText.style.color = 'inherit';
            }
        }, 1000);
    });

    // --- 6. NHẬN DATA VÀ XỬ LÝ ĐỌC ---
    socket.on('audio-data', d => {
        if (!document.getElementById('masterToggle').checked) return;

        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
        chat.prepend(div);
        if(chat.childNodes.length > 50) chat.removeChild(chat.lastChild);

        const low = d.comment.toLowerCase();
        if (document.getElementById('botToggle').checked && (low.includes("mấy giờ") || low.includes("ngày âm") || low.includes("âm lịch"))) {
            const now = new Date();
            let rep = low.includes("mấy giờ") ? `Bây giờ là ${now.getHours()} giờ ${now.getMinutes()} phút.` : `Hôm nay là ngày ${document.getElementById('clock-date').innerText.split('ÂL: ')[1]} âm lịch nha.`;
            const botUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(rep)}&tl=vi&client=tw-ob`;
            queue.push(botUrl);
        } else {
            if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
            if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
            if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
            
            if (d.audio) queue.push(d.audio);
        }

        if(!playing) play();
    });

    function play() {
        if(!queue.length || !document.getElementById('masterToggle').checked){ playing=false; return; }
        playing = true;
        const a = new Audio(queue.shift());
        a.playbackRate = currentSpeed;
        a.onended = () => setTimeout(play, 100);
        a.play().catch(() => play());
    }
</script>
</body>
</html>
