<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Chat Reader</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #ff0050; color: white; cursor: pointer; font-weight: bold; }
        #chat-box { height: 500px; overflow-y: auto; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; display: flex; flex-direction: column-reverse; }
        .comment { background: #2a2a2a; margin-bottom: 8px; padding: 10px; border-radius: 10px; animation: fadeIn 0.3s ease; }
        .user { color: #00f2ea; font-weight: bold; font-size: 0.9em; }
        .text { margin-top: 4px; line-height: 1.4; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #status { font-size: 0.8em; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>TikTok Live Chat</h2>
        <div>
            <input type="text" id="username" placeholder="Nhập tên user (VD: @garena_liên_quân)">
            <button onclick="connect()">Kết nối</button>
        </div>
        <div id="status">Chưa kết nối</div>

        <div id="chat-box"></div>
    </div>

    <script>
        // QUAN TRỌNG: Thay link dưới đây bằng link Web Service của bạn trên Render sau khi deploy
        const RENDER_URL = "https://ten-ung-dung-cua-ban.onrender.com"; 
        const socket = io(RENDER_URL);

        function connect() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Vui lòng nhập tên user!");
            
            socket.emit('set-host', user);
            document.getElementById('status').innerText = "Đang thử kết nối...";
        }

        socket.on('status', (msg) => {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = "#00ff00";
        });

        socket.on('new-comment', (data) => {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'comment';
            div.innerHTML = `
                <div class="user">${data.nickname} (@${data.uniqueId})</div>
                <div class="text">${data.comment}</div>
            `;
            chatBox.prepend(div);
        });

        socket.on('error', (msg) => {
            alert(msg);
            document.getElementById('status').innerText = "Lỗi kết nối";
            document.getElementById('status').style.color = "red";
        });
    </script>
</body>
</html>
