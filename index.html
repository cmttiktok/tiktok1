<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bèo Control 🌸 PK Master</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --primary: #ff85a2; --bg: #fff5f7; --card: #ffffff; --text: #5d4037; --border: #f8bbd0; --success: #4caf50; --error: #ff5252; --pk: #4dd0e1; }
        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }
        .left-side { width: 330px; display: flex; flex-direction: column; border-right: 2px solid var(--border); background: #fff; flex-shrink: 0; }
        .right-side { flex: 1; display: flex; flex-direction: column; padding: 15px; background: var(--bg); overflow: hidden; }

        .clock-box { background: linear-gradient(135deg, #ff85a2, #ffb3c6); color: white; padding: 12px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(255,133,162,0.2); }
        #clock-time { font-size: 30px; font-weight: 700; line-height: 1; }
        #clock-date { font-size: 11px; opacity: 0.9; margin: 3px 0; }
        .brand { font-size: 13px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 3px; }

        .control-panel { padding: 12px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
        .box-conn { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 18px; display: flex; flex-direction: column; gap: 8px; }
        
        /* FIX NÚT KẾT NỐI */
        .conn-row { display: flex; gap: 5px; width: 100%; }
        input[type="text"] { flex: 1; min-width: 0; padding: 10px; border-radius: 10px; border: 2px solid var(--border); outline: none; font-family: 'Quicksand'; font-weight: 700; }
        .btn-conn { background: var(--primary); color: white; border: none; padding: 0 12px; border-radius: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 13px; }

        #stt-container { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; font-weight: 700; padding: 8px; border-radius: 10px; background: #fff8f9; border: 1px dashed var(--border); min-height: 35px; }
        .stt-success { color: var(--success) !important; border-color: var(--success) !important; background: #f1f8f1 !important; }
        .stt-error { color: var(--error) !important; border-color: var(--error) !important; background: #fff1f1 !important; }

        .sw-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sw-item { background: white; border: 1px solid var(--border); padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; text-align: center; }
        .sw-item.master { grid-column: span 2; flex-direction: row; justify-content: space-between; font-size: 11px; border-color: var(--error); color: var(--error); }
        
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        .master input:checked + .slider { background: var(--error); }
        input:checked + .slider:before { transform: translateX(16px); }

        .journal-header { background: white; padding: 10px 15px; border-radius: 15px 15px 0 0; border: 2px solid var(--border); border-bottom: none; font-weight: 700; color: var(--primary); font-size: 13px; }
        .journal-content { flex: 1; background: white; border: 2px solid var(--border); border-radius: 0 0 15px 15px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; }
        .msg { padding: 8px 12px; background: var(--bg); border-left: 4px solid var(--primary); border-radius: 8px; font-size: 13px; word-break: break-word; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; height: 100vh; }
            .left-side { width: 100%; border-right: none; }
            .right-side { flex: 1; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-side">
        <div class="clock-box">
            <div id="clock-time">00:00:00</div>
            <div id="clock-date">Đang tải...</div>
            <div class="brand">Bèo Google 🌸</div>
        </div>

        <div class="control-panel">
            <div class="box-conn">
                <div class="conn-row">
                    <input type="text" id="user" placeholder="ID TikTok...">
                    <button class="btn-conn" onclick="start()">KẾT NỐI</button>
                </div>
                <div id="stt-container">
                    <span id="stt-icon">✨</span>
                    <span id="stt-text">Sẵn sàng kết nối</span>
                </div>
            </div>

            <div class="box-conn" style="padding: 10px;">
                <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--primary); margin-bottom: 5px;">
                    <span>TỐC ĐỘ</span><span id="speed-val">1.2x</span>
                </div>
                <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.2" oninput="changeSpeed(this.value)" style="width: 100%;">
            </div>

            <div class="sw-list">
                <div class="sw-item master"><span>TẮT HỆ THỐNG</span><label class="switch master"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>👋 CHÀO PHÒNG</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🎁 TẶNG QUÀ</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🤖 BOT ĐÁP</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item" style="border-color: var(--pk);"><span>⚔️ NHẮC PK</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="journal-header">🌸 NHẬT KÝ LIVE</div>
        <div class="journal-content" id="chat"></div>
    </div>
</div>

<script>
    const socket = io();
    let queue = [], playing = false, currentSpeed = 1.2;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('vi-VN');
        const tet2026 = new Date(2026, 1, 17);
        const diff = Math.floor((now - tet2026) / 86400000);
        let lDay = (diff % 30) + 1; let lMonth = (Math.floor(diff / 30) % 12) + 1;
        if (lDay <= 0) { lDay += 30; lMonth -= 1; }
        document.getElementById('clock-date').innerText = `DL: ${now.getDate()}/${now.getMonth()+1} - ÂL: ${lDay}/${lMonth}`;
    }
    setInterval(updateClock, 1000); updateClock();

    function changeSpeed(v) {
        document.getElementById('speed-val').innerText = v + "x";
        currentSpeed = parseFloat(v);
    }

    // --- CHỐNG SPAM ICON & KÝ TỰ ---
    function cleanSpam(text) {
        // Rút gọn các ký tự lặp lại như "haaaaaa" -> "haaa"
        let cleaned = text.replace(/(.)\1{3,}/g, '$1$1$1');
        // Rút gọn icon lặp lại
        cleaned = cleaned.replace(/([\uD800-\uDBFF][\uDC00-\uDFFF])\1{2,}/g, '$1$1');
        return cleaned;
    }

    function start() {
        const u = document.getElementById('user').value.trim();
        if(!u) return;
        
        // Mở khóa âm thanh đơn giản
        new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=").play().catch(()=>{});

        document.getElementById('stt-icon').innerText = "⏳";
        document.getElementById('stt-text').innerText = "Đang kết nối...";
        socket.emit('set-username', u);
    }

    socket.on('status', m => {
        const sttBox = document.getElementById('stt-container');
        if(m.includes('✅')) {
            document.getElementById('stt-icon').innerText = "✅";
            document.getElementById('stt-text').innerText = "Kết nối thành công";
            sttBox.className = "stt-success";
        } else {
            document.getElementById('stt-icon').innerText = "❌";
            document.getElementById('stt-text').innerText = "Lỗi, thử lại nha";
            sttBox.className = "stt-error";
        }
    });

    socket.on('audio-data', d => {
        if (!document.getElementById('masterToggle').checked) return;

        // Nhật ký live
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
        chat.prepend(div);
        if(chat.childNodes.length > 50) chat.removeChild(chat.lastChild);

        // Lọc theo switch
        if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
        if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
        if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;

        if (d.audio) {
            // Đẩy vào hàng đợi
            queue.push(d.audio);
            if(!playing) play();
        }
    });

    function play() {
        if(!queue.length || !document.getElementById('masterToggle').checked){ playing=false; return; }
        playing = true;
        const a = new Audio(queue.shift());
        a.playbackRate = currentSpeed;
        a.onended = () => setTimeout(play, 100);
        a.play().catch(() => play());
    }
</script>
</body>
</html>
