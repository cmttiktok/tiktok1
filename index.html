<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDOL BÈO - LUXURY PINK DASHBOARD</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-deep: #ff2d55;
            --pink-light: #ff85a1;
            --pink-soft: #fff0f3;
            --bg-dark: #1a1a1a;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --radius: 24px;
            --shadow: 0 10px 40px rgba(255, 45, 85, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fdf2f4;
            background-image: linear-gradient(135deg, #fdf2f4 0%, #fae1e6 100%);
            margin: 0; display: flex; height: 100vh; color: var(--text-main); overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 380px; background: var(--card-bg); border-right: 1px solid rgba(255, 45, 85, 0.1);
            display: flex; flex-direction: column; padding: 30px; box-sizing: border-box;
            box-shadow: 15px 0 50px rgba(0,0,0,0.03); z-index: 10;
        }

        .brand { font-weight: 800; font-size: 24px; color: var(--pink-deep); display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }

        /* CLOCK WIDGET */
        .clock-widget {
            background: linear-gradient(135deg, var(--pink-deep), #ff758c);
            padding: 20px; border-radius: var(--radius); color: white; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(255, 45, 85, 0.3); text-align: center;
        }
        #time { font-size: 32px; font-weight: 800; letter-spacing: 2px; }
        #date-solar { font-size: 14px; opacity: 0.9; margin-top: 5px; font-weight: 600; }

        /* NÚT CHẾ ĐỘ CHIẾN PK - MỚI */
        .pk-mode-btn {
            background: #1a1a1a; color: #ffd700; border: 2px solid #ffd700;
            padding: 15px; border-radius: 20px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 13px;
        }
        .pk-mode-btn.active { background: #ffd700; color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        input[type="text"] {
            width: 100%; padding: 16px 25px; border-radius: 30px; border: 2px solid #eee;
            background: #f8f9fa; box-sizing: border-box; font-size: 15px; font-weight: 600; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--pink-deep); outline: none; background: white; }

        .btn-start {
            width: 100%; padding: 16px; border-radius: 30px; border: none;
            background: var(--pink-deep); color: white; font-weight: 800;
            margin-top: 10px; cursor: pointer; transition: 0.3s;
        }

        /* TOGGLES */
        .toggle-container { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .toggle-card {
            background: #fff; padding: 12px; border-radius: 18px; border: 1px solid #f1f1f1;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .toggle-card span { font-size: 11px; font-weight: 700; color: #666; }

        /* MAIN */
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .chat-wrapper {
            flex: 1; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid white; box-shadow: var(--shadow);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header { padding: 20px 30px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 12px; }

        /* MESSAGE BUBBLE */
        .msg { display: flex; flex-direction: column; max-width: 80%; animation: popIn 0.3s ease; }
        .msg-bubble { background: white; padding: 12px 18px; border-radius: 20px; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); font-size: 14px; }
        .msg-user { font-size: 11px; font-weight: 800; margin-bottom: 4px; color: var(--pink-deep); }

        /* SWITCH */
        .switch { position: relative; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ddd; border-radius: 30px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: var(--pink-deep); }
        input:checked + .slider:before { transform: translateX(14px); }

        .admin-link { margin-top: auto; text-align: center; text-decoration: none; color: #666; font-weight: 700; font-size: 12px; padding: 15px; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="fab fa-tiktok"></i> IDOL BÈO</div>
        
        <div class="clock-widget">
            <div id="time">00:00:00</div>
            <div id="date-solar">Đang tải ngày tháng...</div>
        </div>

        <button id="pkModeBtn" class="pk-mode-btn" onclick="togglePKMode()">
            <i class="fas fa-bolt"></i> CHẾ ĐỘ CHIẾN PK: TẮT
        </button>

        <div class="status-box" style="background: var(--pink-soft); padding: 12px; border-radius: 15px; margin-bottom: 15px;">
            <span id="stt" style="font-size: 13px; font-weight: 700;">Sẵn sàng kết nối</span>
        </div>

        <input type="text" id="user" placeholder="ID TikTok...">
        <button class="btn-start" onclick="start()">BẮT ĐẦU</button>

        <div class="toggle-container">
            <div class="toggle-card"><span>Đọc Chat</span><label class="switch"><input type="checkbox" id="chatToggle" checked><span class="slider"></span></label></div>
            <div class="toggle-card"><span>Chào khách</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="toggle-card"><span>Quà tặng</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="toggle-card"><span>Trợ lý</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
        </div>

        <a href="/admin" class="admin-link">QUẢN LÝ TỪ CẤM & ICON</a>
    </div>

    <div class="main">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h3 style="margin:0; font-size: 16px;">Nhật ký Live</h3>
                <span id="counter" style="background:var(--pink-deep); color:white; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800">0 TIN</span>
            </div>
            <div id="chat"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false, count = 0;
        let isPKMode = false; // Biến trạng thái chế độ PK

        // Hàm bật/tắt chế độ PK
        function togglePKMode() {
            isPKMode = !isPKMode;
            const btn = document.getElementById('pkModeBtn');
            if (isPKMode) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-fire"></i> CHẾ ĐỘ CHIẾN PK: BẬT';
                // Tự động tắt các checkbox khác khi bật PK Mode
                document.getElementById('chatToggle').checked = false;
                document.getElementById('welcomeToggle').checked = false;
                document.getElementById('botToggle').checked = false;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-bolt"></i> CHẾ ĐỘ CHIẾN PK: TẮT';
                // Bật lại các checkbox
                document.getElementById('chatToggle').checked = true;
                document.getElementById('welcomeToggle').checked = true;
                document.getElementById('botToggle').checked = true;
            }
        }

        // Đồng hồ
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('date-solar').innerText = now.toLocaleDateString('vi-VN', {weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric'});
        }, 1000);

        function start() { socket.emit('set-username', document.getElementById('user').value); }
        
        socket.on('status', m => {
            document.getElementById('stt').innerText = m;
            document.getElementById('stt').style.color = m.includes('Đã kết nối') ? '#2ecc71' : '#ff2d55';
        });

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<div class="msg-user">${d.user}</div><div class="msg-bubble">${d.comment}</div>`;
            chat.prepend(div);
            
            count++;
            document.getElementById('counter').innerText = `${count} TIN`;

            if (d.audio) {
                // LOGIC QUAN TRỌNG: Nếu là PK thì luôn đọc, nếu không phải PK thì check PK Mode
                if (d.type === 'pk') {
                    queue.push(d.audio);
                    if (!playing) play();
                    return;
                }

                // Nếu đang bật PK Mode, bỏ qua tất cả các loại âm thanh khác
                if (isPKMode) return;

                // Nếu không phải PK Mode, check checkbox như bình thường
                if (d.type === 'chat' && !document.getElementById('chatToggle').checked) return;
                if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;

                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
