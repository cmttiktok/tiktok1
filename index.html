<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết cho tháng ngày bên nhau</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .glass { 
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        input { width: 70%; padding: 10px; border-radius: 10px; border: none; background: #222; color: #fff; }
        button { padding: 10px; border-radius: 10px; background: #fe2c55; color: #fff; border: none; cursor: pointer; }
        #chat { height: 400px; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column-reverse; }
        .item { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 10px; border-radius: 10px; font-size: 14px; }
        .u { color: #00f2ea; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass">
        <h3>TikTok Live Reader</h3>
        <input type="text" id="id" placeholder="Nhập ID...">
        <button onclick="conn()">Kết nối</button>
        <div id="chat"></div>
    </div>
    <script>
        const socket = io();
        function conn() { socket.emit('set-host', document.getElementById('id').value); }
        socket.on('new-comment', d => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="u">${d.user}:</span> ${d.msg}`;
            document.getElementById('chat').prepend(div);
        });
    </script>
</body>
</html>
