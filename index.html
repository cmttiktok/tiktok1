<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bèo Control 🌸</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background: #fff5f7; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #fff; border-right: 2px solid #f8bbd0; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #stt-box { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; border: 2px solid #f8bbd0; background: #fff; min-height: 60px; }
        #stt-box.success { border-color: #4caf50; background: #f1f8f1; }
        #avatar { width: 45px; height: 45px; border-radius: 50%; display: none; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 12px; border-radius: 10px; border: 2px solid #f8bbd0; outline: none; }
        button { background: #ff85a2; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        #log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; }
        .msg { padding: 10px; background: #fff; border-radius: 10px; border-left: 4px solid #ff85a2; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:#ff85a2; margin:0">Bèo Control 🌸</h3>
    <input type="text" id="user" placeholder="ID TikTok...">
    <button onclick="start()">KẾT NỐI</button>
    <div id="stt-box">
        <img id="avatar" src="">
        <span id="stt-txt" style="font-size:13px; font-weight:700">Chưa kết nối</span>
    </div>
</div>

<div id="log"></div>

<script>
    const socket = io();
    function start() {
        const u = document.getElementById('user').value.trim();
        if(!u) return;
        document.getElementById('stt-txt').innerText = "⏳ Đang kết nối...";
        socket.emit('set-username', u);
    }

    socket.on('status', (res) => {
        const box = document.getElementById('stt-box');
        if(res.ok) {
            box.classList.add('success');
            document.getElementById('stt-txt').innerText = "Kết nối thành công";
        }
    });

    socket.on('audio-data', (d) => {
        // Hiện avatar vào khung trạng thái nếu chưa có
        const avt = document.getElementById('avatar');
        if(d.profile && avt.style.display !== 'block') {
            // Sử dụng proxy để tránh lỗi load ảnh TikTok
            avt.src = `https://images.weserv.nl/?url=${encodeURIComponent(d.profile)}`;
            avt.style.display = 'block';
        }

        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
        log.prepend(div);
    });
</script>
</body>
</html>
