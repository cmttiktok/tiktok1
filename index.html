<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDOL BÈO - LUXURY DASHBOARD</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --pink: #ff2d55; --pink-soft: #fff0f3; --text: #2d3436; --radius: 16px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdf2f4; margin: 0; display: flex; height: 100vh; color: var(--text); overflow: hidden; padding: 10px; box-sizing: border-box; }
        
        .sidebar { width: 300px; background: #fff; border-radius: var(--radius); display: flex; flex-direction: column; padding: 15px; box-shadow: 5px 0 20px rgba(0,0,0,0.03); }
        .brand { font-weight: 800; font-size: 18px; color: var(--pink); margin-bottom: 12px; text-align: center; }
        
        .clock-widget { background: linear-gradient(135deg, var(--pink), #ff758c); padding: 12px; border-radius: 12px; color: white; text-align: center; margin-bottom: 12px; }
        #time { font-size: 22px; font-weight: 800; }
        #date-solar { font-size: 11px; font-weight: 600; opacity: 0.9; }

        .pk-btn { background: #1a1a1a; color: #ffd700; border: 1.5px solid #ffd700; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 11px; width: 100%; margin-bottom: 10px; }
        .pk-btn.active { background: #ffd700; color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .speed-control { background: var(--pink-soft); padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .speed-control span { font-size: 10px; font-weight: 800; color: var(--pink); }

        input[type="text"] { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1.5px solid #eee; font-size: 13px; font-weight: 600; margin-bottom: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 10px; border-radius: 20px; border: none; background: var(--pink); color: white; font-weight: 800; cursor: pointer; font-size: 13px; }

        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .toggle-item { background: #fff; padding: 8px; border-radius: 12px; border: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; }
        .toggle-item span { font-size: 10px; font-weight: 700; }

        .main { flex: 1; padding-left: 10px; display: flex; flex-direction: column; }
        .chat-box { flex: 1; background: rgba(255, 255, 255, 0.8); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .chat-header { padding: 10px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; }

        .msg { max-width: 90%; animation: pop 0.2s ease; }
        .msg-bubble { background: white; padding: 8px 15px; border-radius: 15px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .msg-user { font-size: 10px; font-weight: 800; color: var(--pink); margin-left: 5px; }

        .switch { position: relative; width: 30px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ddd; border-radius: 16px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: var(--pink); }
        input:checked + .slider:before { transform: translateX(14px); }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="fab fa-tiktok"></i> IDOL BÈO</div>
        <div class="clock-widget"><div id="time">00:00:00</div><div id="date-solar">Đang tải...</div></div>
        
        <button id="pkBtn" class="pk-btn" onclick="togglePK()"><i class="fas fa-bolt"></i> CHIẾN PK: TẮT</button>
        
        <div class="speed-control">
            <div style="display:flex; justify-content:space-between;"><span>TỐC ĐỘ:</span><span id="sVal">1.0x</span></div>
            <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" style="width:100%; accent-color:var(--pink);" oninput="document.getElementById('sVal').innerText=this.value+'x'">
        </div>

        <input type="text" id="user" placeholder="@id_tiktok">
        <button class="btn-main" onclick="start()">KẾT NỐI LIVE</button>

        <div class="toggle-grid">
            <div class="toggle-item"><span>Chat</span><label class="switch"><input type="checkbox" id="chatT" checked><span class="slider"></span></label></div>
            <div class="toggle-item"><span>Chào</span><label class="switch"><input type="checkbox" id="welcomeT" checked><span class="slider"></span></label></div>
            <div class="toggle-item"><span>Quà</span><label class="switch"><input type="checkbox" id="giftT" checked><span class="slider"></span></label></div>
            <div class="toggle-item"><span>Bot</span><label class="switch"><input type="checkbox" id="botT" checked><span class="slider"></span></label></div>
        </div>
        <a href="/admin" style="margin-top:auto; text-align:center; font-size:11px; color:#999; text-decoration:none; font-weight:700;">QUẢN LÝ DỮ LIỆU</a>
    </div>

    <div class="main">
        <div class="chat-box">
            <div class="chat-header"><h3 style="margin:0; font-size:14px; color:var(--pink)">Nhật ký Live</h3><span id="cnt" style="background:var(--pink); color:white; padding:2px 10px; border-radius:10px; font-size:10px; font-weight:800">0 TIN</span></div>
            <div id="chat"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false, count = 0, isPK = false;

        function togglePK() {
            isPK = !isPK;
            const btn = document.getElementById('pkBtn');
            btn.classList.toggle('active', isPK);
            btn.innerHTML = isPK ? '<i class="fas fa-fire"></i> CHIẾN PK: BẬT' : '<i class="fas fa-bolt"></i> CHIẾN PK: TẮT';
            ['chatT','welcomeT','botT'].forEach(id => document.getElementById(id).checked = !isPK);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('date-solar').innerText = now.toLocaleDateString('vi-VN', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
        }, 1000);

        function start() { socket.emit('set-username', document.getElementById('user').value); }
        socket.on('status', m => { console.log(m); });

        socket.on('audio-data', d => {
            const div = document.createElement('div'); div.className = 'msg';
            div.innerHTML = `<div class="msg-user">${d.user}</div><div class="msg-bubble">${d.comment}</div>`;
            document.getElementById('chat').prepend(div);
            count++; document.getElementById('cnt').innerText = `${count} TIN`;

            if (d.audio) {
                if (d.type === 'pk') { queue.push(d.audio); if (!playing) play(); return; }
                if (isPK) return;
                if (d.type === 'chat' && !document.getElementById('chatT').checked) return;
                if (d.type === 'welcome' && !document.getElementById('welcomeT').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftT').checked) return;
                if (d.type === 'bot' && !document.getElementById('botT').checked) return;
                queue.push(d.audio); if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = document.getElementById('speed').value;
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
