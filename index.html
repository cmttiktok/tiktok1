<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bèo Control 🌸 PK Master</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --primary: #ff85a2; --bg: #fff5f7; --card: #ffffff; --text: #5d4037; --border: #f8bbd0; --success: #4caf50; --error: #ff5252; --pk: #4dd0e1; }
        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }
        .left-side { width: 330px; display: flex; flex-direction: column; border-right: 2px solid var(--border); background: #fff; flex-shrink: 0; }
        .right-side { flex: 1; display: flex; flex-direction: column; padding: 15px; background: var(--bg); overflow: hidden; }

        .clock-box { background: linear-gradient(135deg, #ff85a2, #ffb3c6); color: white; padding: 12px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(255,133,162,0.2); }
        #clock-time { font-size: 30px; font-weight: 700; line-height: 1; }
        #clock-date { font-size: 11px; opacity: 0.9; margin: 3px 0; }

        .control-panel { padding: 12px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
        .box-conn { background: #fff; border: 2px solid var(--border); padding: 12px; border-radius: 18px; display: flex; flex-direction: column; gap: 8px; }
        .conn-row { display: flex; gap: 5px; width: 100%; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--border); outline: none; font-size: 14px; font-weight: 700; font-family: 'Quicksand'; }
        .btn-conn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px; }

        #stt-container { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 12px; font-weight: 700; padding: 8px; border-radius: 12px; background: #fff8f9; border: 1.5px dashed var(--border); min-height: 45px; }
        .stt-success { color: var(--success); border-color: var(--success); background: #f1f8f1; border-style: solid; }

        .sw-list { display: flex; flex-direction: column; gap: 6px; }
        .sw-item { background: white; border: 1px solid var(--border); padding: 10px 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .journal-content { flex: 1; background: white; border: 2px solid var(--border); border-radius: 15px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; }
        .msg { padding: 8px 12px; background: #fff5f7; border-radius: 15px; font-size: 13px; border: 1px solid #ffebee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-side">
        <div class="clock-box">
            <div id="clock-time">00:00:00</div>
            <div id="clock-date">Đang tải...</div>
            <div style="font-size: 12px; font-weight: 700; margin-top:5px;">Bèo Google 🌸</div>
        </div>

        <div class="control-panel">
            <div class="box-conn">
                <div class="conn-row">
                    <input type="text" id="user" placeholder="chipham1">
                    <button class="btn-conn" onclick="start()">KẾT NỐI</button>
                </div>
                <div id="stt-container"><span id="stt-text">⌛ Sẵn sàng kết nối...</span></div>
            </div>

            <div class="sw-list">
                <div class="sw-item"><span>TẮT HỆ THỐNG</span><label class="switch"><input type="checkbox" id="masterToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item" style="color: #00acc1;"><span>NHẮC PK 20S</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>👋 CHÀO PHÒNG</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🎁 TẶNG QUÀ</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
                <div class="sw-item"><span>🤖 BOT ĐÁP</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            </div>
        </div>
    </div>
    <div class="right-side">
        <div class="journal-content" id="chat"></div>
    </div>
</div>

<script>
    const socket = io();
    let queue = [], playing = false;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('vi-VN');
        document.getElementById('clock-date').innerText = `DL: ${now.getDate()}/${now.getMonth()+1}/2026 - ÂL: 23/1`;
    }
    setInterval(updateClock, 1000); updateClock();

    function start() {
        const u = document.getElementById('user').value.trim();
        if(!u) return;
        socket.emit('set-username', u);
    }

    socket.on('status', m => {
        document.getElementById('stt-text').innerText = m;
        if(m.includes('✅')) document.getElementById('stt-container').classList.add('stt-success');
    });

    socket.on('audio-data', d => {
        if (!document.getElementById('masterToggle').checked) return;

        // Nhật ký
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
        chat.prepend(div);

        // Kiểm tra Switch
        if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
        if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
        if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
        if ((d.type === 'chat' || d.type === 'bot') && !document.getElementById('botToggle').checked) return;

        if (d.audio) {
            queue.push(d.audio);
            if(!playing) play();
        }
    });

    function play() {
        if(!queue.length || !document.getElementById('masterToggle').checked) { playing = false; return; }
        playing = true;
        const a = new Audio(queue.shift());
        a.onended = () => setTimeout(play, 100);
        a.play().catch(() => play());
    }
</script>
</body>
</html>
