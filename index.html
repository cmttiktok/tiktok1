<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE DASHBOARD - IDOL BÈO</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main: #fe2c55; --bg: #0b0b0d; --card: rgba(255,255,255,0.05); --accent: #25f4ee; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar điều khiển */
        .sidebar { width: 300px; background: #161722; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--main); display: flex; align-items: center; gap: 10px; }
        
        /* Nút Admin */
        .admin-link { text-decoration: none; color: #aaa; font-size: 13px; padding: 10px; border: 1px dashed #444; border-radius: 8px; text-align: center; transition: 0.3s; }
        .admin-link:hover { border-color: var(--main); color: white; }

        .status-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent); }
        
        .toggle-group { display: flex; flex-direction: column; gap: 10px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 10px; }
        
        /* Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .chat-container { flex: 1; background: #000; border-radius: 15px; border: 1px solid #222; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; }
        
        .msg-card { background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--main); animation: slideIn 0.2s ease; }
        .msg-user { color: var(--accent); font-weight: bold; font-size: 14px; }
        .msg-text { margin-top: 5px; color: #efefef; line-height: 1.4; }

        /* Switch UI */
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; border-radius: 22px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--main); }
        input:checked + .slider:before { transform: translateX(18px); }

        input[type="text"] { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button.btn-connect { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fab fa-tiktok"></i> IDOL BÈO TTS</div>
        
        <div class="status-box">
            <div style="font-size: 11px; color: #888;">TRẠNG THÁI</div>
            <div id="stt" style="font-weight: bold; color: var(--accent); margin-top: 5px;">Chưa kết nối</div>
        </div>

        <div>
            <input type="text" id="user" placeholder="ID TikTok chủ live...">
            <button class="btn-connect" onclick="start()" style="margin-top: 8px;">KẾT NỐI NGAY</button>
        </div>

        <div class="toggle-group">
            <div class="setting-item"><span>Chào khách</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="setting-item"><span>Cảm ơn quà</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="setting-item"><span>Trợ lý ảo</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="setting-item"><span>Nhắc PK</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
        </div>

        <a href="/admin" class="admin-link"><i class="fas fa-cog"></i> Cài đặt từ cấm & kịch bản</a>
    </div>

    <div class="main-content">
        <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <h4 style="margin:0">NHẬT KÝ LIVE STREAM</h4>
            <span id="counter" style="font-size: 12px; color: #555;">0 tin nhắn</span>
        </div>
        <div class="chat-container" id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false, count = 0;

        function start() { socket.emit('set-username', document.getElementById('user').value); }
        socket.on('status', m => document.getElementById('stt').innerText = m);
        
        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.className = 'msg-card';
            const color = d.type === 'bot' ? '#00f2ea' : (d.type === 'gift' ? '#ff4d4d' : '#fe2c55');
            div.innerHTML = `<div class="msg-user" style="color:${color}">${d.user}</div><div class="msg-text">${d.comment}</div>`;
            chat.prepend(div);
            
            count++; document.getElementById('counter').innerText = `${count} tin nhắn`;

            if (d.audio) {
                if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                queue.push(d.audio); if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true; const a = new Audio(queue.shift());
            a.onended = () => setTimeout(play, 300); a.play().catch(() => play());
        }
    </script>
</body>
</html>
