<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKTOK TTS DASHBOARD</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #fe2c55;
            --secondary: #25f4ee;
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #161823;
            --text-sub: #585b64;
            --border: #ececed;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar bên trái */
        .sidebar {
            width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .logo i { color: var(--primary); }

        .status-card {
            background: #f1f1f2;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .status-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
        #stt { font-weight: 700; margin-top: 4px; display: block; color: var(--primary); }

        .input-group { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f1f1f2;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); background: #fff; }

        .btn-connect {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-connect:hover { opacity: 0.9; transform: translateY(-1px); }

        .controls-title { font-size: 13px; font-weight: 700; color: var(--text-sub); margin: 20px 0 10px 0; }
        
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f1f2;
        }
        .toggle-item span { font-size: 14px; font-weight: 500; }

        .admin-btn {
            margin-top: auto;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #f1f1f2;
            color: var(--text-main);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Vùng nội dung chính (Chat Log) */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .main-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            background: #fff;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-bubble {
            background: #f1f1f2;
            padding: 10px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            font-size: 15px;
            line-height: 1.4;
        }

        .msg-user {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
            margin-left: 4px;
            color: var(--text-sub);
        }

        /* Switch Styling */
        .switch { position: relative; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: #00f2ea; }
        input:checked + .slider:before { transform: translateX(14px); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main { height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fab fa-tiktok"></i> IDOL BÈO</div>
        
        <div class="status-card">
            <span class="status-label">Trạng thái Live</span>
            <span id="stt">Sẵn sàng kết nối</span>
        </div>

        <div class="input-group">
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="btn-connect" onclick="start()" style="margin-top: 10px;">BẮT ĐẦU</button>
        </div>

        <div class="controls-title">CẤU HÌNH NHANH</div>
        <div class="toggle-item"><span>Chào khách</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Cảm ơn quà</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Trợ lý ảo</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
        <div class="toggle-item"><span>Nhắc PK</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>

        <a href="/admin" class="admin-btn"><i class="fas fa-cog"></i> QUẢN LÝ DỮ LIỆU</a>
    </div>

    <div class="main">
        <div class="main-header">
            <h3 style="margin:0; font-size:16px;">Nhật ký Livestream</h3>
            <span id="counter" style="font-size:12px; color:var(--text-sub)">0 tin nhắn</span>
        </div>
        <div id="chat">
            <div style="text-align:center; color:#ccc; margin-top:50px;">
                <i class="fas fa-comments fa-3x"></i>
                <p>Đang đợi tin nhắn từ TikTok...</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false, count = 0;

        function start() { 
            const user = document.getElementById('user').value;
            if(!user) return alert("Vui lòng nhập ID!");
            socket.emit('set-username', user); 
        }

        socket.on('status', m => {
            const stt = document.getElementById('stt');
            stt.innerText = m;
            stt.style.color = m.includes('Đã kết nối') ? '#00f2ea' : '#fe2c55';
        });
        
        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            if(count === 0) chat.innerHTML = ''; // Xóa placeholder

            const div = document.createElement('div');
            div.className = 'msg';
            
            // Màu sắc cho từng loại user
            let userColor = '#585b64';
            if(d.type === 'gift') userColor = '#fe2c55';
            if(d.type === 'bot') userColor = '#00f2ea';

            div.innerHTML = `
                <div class="msg-user" style="color:${userColor}">${d.user}</div>
                <div class="msg-bubble">${d.comment}</div>
            `;
            chat.prepend(div);
            
            count++;
            document.getElementById('counter').innerText = `${count} tin nhắn`;

            if (d.audio) {
                if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
