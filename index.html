<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Viết cho tháng ngày bên nhau - Google Voice Server</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .glass { 
            width: 100%; max-width: 450px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
        }
        .voice-btn { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; background: #444; color: #fff; }
        .active { background: #00f2ea; color: #000; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #222; color: #fff; }
        button#conn { background: #fe2c55; color: #fff; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }
        #chat { height: 400px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; }
        .item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border-left: 3px solid #fe2c55; }
        .u { color: #00f2ea; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="glass">
        <button id="btnVoice" class="voice-btn" onclick="toggleVoice()">🔇 CHẾ ĐỘ CHỊ GOOGLE: TẮT</button>
        <div class="controls">
            <input type="text" id="id" placeholder="Nhập ID TikTok...">
            <button id="conn" onclick="conn()">Kết nối</button>
        </div>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let isVoiceEnabled = false;
        const audioQueue = [];
        let isPlaying = false;

        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('btnVoice');
            btn.innerText = isVoiceEnabled ? "🔊 CHẾ ĐỘ CHỊ GOOGLE: BẬT" : "🔇 CHẾ ĐỘ CHỊ GOOGLE: TẮT";
            btn.classList.toggle('active', isVoiceEnabled);
        }

        function conn() { socket.emit('set-host', document.getElementById('id').value); }

        // Hàm phát âm thanh theo thứ tự (không bị đè lên nhau)
        function playNext() {
            if (audioQueue.length === 0 || isPlaying) return;
            
            isPlaying = true;
            const audio = new Audio(audioQueue.shift());
            audio.onended = () => {
                isPlaying = false;
                playNext();
            };
            audio.play().catch(() => {
                isPlaying = false;
                playNext();
            });
        }

        socket.on('new-comment', d => {
            // Hiện comment
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="u">${d.user}:</span> ${d.msg}`;
            document.getElementById('chat').prepend(div);

            // Cho âm thanh vào hàng đợi để đọc lần lượt
            if (isVoiceEnabled && d.audio) {
                audioQueue.push(d.audio);
                playNext();
            }
        });
    </script>
</body>
</html>
